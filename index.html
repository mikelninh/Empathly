<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gefühle-Memory — Lerne über Gefühle zu sprechen 💛</title>
  <meta name="description" content="Ein Kartenspiel über Gefühle. 67 Emotionen in 11 Sprachen — und Raum, darüber zu sprechen.">
  <meta name="theme-color" content="#0D0B14">
  <meta property="og:title" content="Gefühle-Memory 💛">
  <meta property="og:description" content="67 Gefühle. 6 Kategorien. 11 Sprachen. Finde Paare, sprich darüber.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💛</text></svg>">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,400;1,600&display=swap" rel="stylesheet">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gefühle-Memory">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22><rect width=%22512%22 height=%22512%22 rx=%2280%22 fill=%22%230D0B14%22/><text x=%22256%22 y=%22380%22 font-size=%22360%22 text-anchor=%22middle%22>💛</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-orb bg-orb-4"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <button class="btn-back" id="btn-back" title="Zurück">← Zurück</button>
    <h1>Gefühle-Memory</h1>
    <button class="btn-icon" id="btn-settings" title="Einstellungen">⚙️</button>
    <button class="btn-icon" id="btn-classroom" title="Präsentationsmodus">📽</button>
    <button class="btn-icon" id="btn-sound" title="Sound an/aus">🔊</button>
    <button class="btn-icon" id="btn-dark-mode" title="Dark Mode">🌙</button>
    <div id="user-profile-display" class="user-profile-display" style="display:none"></div>
    <p class="subtitle">Finde die Paare — und sprich über deine Gefühle</p>
  </header>

  <!-- Landing Screen -->
  <section class="landing-screen" id="landing-screen">
    <div class="landing-hero">
      <h2 class="landing-title">Gefühle-Memory</h2>
      <p class="landing-subtitle">67 Gefühle · 6 Kategorien · 11 Sprachen</p>
    </div>

    <!-- Streak / returning user card -->
    <div id="streak-card" class="streak-card" style="display:none"></div>

    <!-- Weekly AI recap (shown after 3+ journal entries) -->
    <div id="weekly-recap-card" class="weekly-recap-card" style="display:none"></div>

    <!-- Backend Stats Widget (shown when backend is connected) -->
    <div id="stats-widget" class="stats-widget" style="display:none"></div>

    <!-- Backend Status Indicator -->
    <div id="backend-status" class="backend-status" title="Backend-Status"></div>

    <!-- Emotion Collection Progress Bar -->
    <div id="collection-bar" class="collection-bar" style="display:none"></div>

    <!-- Favorites Section -->
    <div id="favorites-section" class="favorites-section" style="display:none"></div>

    <!-- Today's Emotion Card (populated by JS) -->
    <div id="todays-emotion-card" class="todays-emotion-card" style="display:none"></div>

    <!-- Daily Challenge Card (populated by JS) -->
    <div id="daily-challenge-card" class="daily-challenge-card" style="display:none"></div>

    <!-- Daily Fun Fact Card (populated by JS) -->
    <div id="daily-funfact-card" class="daily-funfact-card" style="display:none"></div>

    <!-- Fun Fact Button (hidden — kept for JS hook) -->
    <button class="btn-funfact" id="btn-funfact" style="display:none">
      <span class="btn-funfact-icon">💡</span>
      <span>Wusstest du?</span>
    </button>

    <!-- Collapsible Settings Bar -->
    <div class="settings-bar" id="settings-bar">
      <button class="settings-bar-summary" id="settings-bar-toggle">
        <span id="settings-summary-text">🇩🇪 Deutsch ↔ 🇻🇳 Tiếng Việt · 🌊 Mittel</span>
        <span class="settings-bar-arrow">▾</span>
      </button>
      <div class="settings-bar-content" id="settings-bar-content">
        <div class="settings-bar-row">
          <div class="control-group">
            <span id="flag1">🇬🇧</span>
            <select id="lang1">
              <option value="de">Deutsch</option>
              <option value="vi">Tiếng Việt</option>
              <option value="en" selected>English</option>
              <option value="tr">Türkçe</option>
              <option value="ar">العربية</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="uk">Українська</option>
              <option value="pl">Polski</option>
              <option value="el">Ελληνικά</option>
              <option value="ta">தமிழ்</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
              <option value="ko">한국어</option>
              <option value="sa">Sanskrit</option>
            </select>
          </div>
          <span class="settings-bar-swap">↔</span>
          <div class="control-group">
            <span id="flag2">🇬🇷</span>
            <select id="lang2">
              <option value="de">Deutsch</option>
              <option value="vi">Tiếng Việt</option>
              <option value="en">English</option>
              <option value="tr">Türkçe</option>
              <option value="ar">العربية</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="uk">Українська</option>
              <option value="pl">Polski</option>
              <option value="el" selected>Ελληνικά</option>
              <option value="ta">தமிழ்</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
              <option value="ko">한국어</option>
              <option value="sa">Sanskrit</option>
            </select>
          </div>
        </div>
        <div class="settings-bar-row">
          <div class="control-group">
            <select id="difficulty"></select>
          </div>
          <div class="control-group">
            <select id="category">
              <option value="all">Alle Kategorien</option>
            </select>
          </div>
          <div class="control-group multiplayer-toggle">
            <select id="player-count">
              <option value="1">Solo</option>
              <option value="2">2 Spieler</option>
              <option value="3">3 Spieler</option>
              <option value="4">4 Spieler</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Mode Grid -->
    <div class="mode-grid">
      <div class="mode-group">
        <h3 class="mode-group-label">Spielen</h3>
        <div class="mode-group-cards">
          <button class="mode-card" data-mode="classic">
            <span class="mode-card-icon">🃏</span>
            <span class="mode-card-name">Klassisch</span>
            <span class="mode-card-desc">Finde passende Paare</span>
          </button>
          <button class="mode-card" data-mode="talk">
            <span class="mode-card-icon">💬</span>
            <span class="mode-card-name">Gesprächsrunde</span>
            <span class="mode-card-desc">Zieh Karten & sprich</span>
          </button>
          <button class="mode-card" data-mode="story">
            <span class="mode-card-icon">📖</span>
            <span class="mode-card-name">Geschichten</span>
            <span class="mode-card-desc">Erzähle eine Geschichte</span>
          </button>
        </div>
      </div>
      <div class="mode-group">
        <h3 class="mode-group-label">Entdecken</h3>
        <div class="mode-group-cards">
          <button class="mode-card" data-mode="wheel">
            <span class="mode-card-icon">🎡</span>
            <span class="mode-card-name">Emotions-Rad</span>
            <span class="mode-card-desc">Alle 67 Gefühle erkunden</span>
          </button>
          <button class="mode-card" data-mode="checkin">
            <span class="mode-card-icon">🌿</span>
            <span class="mode-card-name">Check-in</span>
            <span class="mode-card-desc">Was brauchst du heute?</span>
          </button>
          <button class="mode-card" data-mode="ask">
            <span class="mode-card-icon">💬</span>
            <span class="mode-card-name">Frag die App</span>
            <span class="mode-card-desc">Stell eine Frage</span>
          </button>
        </div>
      </div>
      <div class="mode-group">
        <h3 class="mode-group-label">Lernen</h3>
        <div class="mode-group-cards">
          <button class="mode-card" data-mode="wotd">
            <span class="mode-card-icon">🌅</span>
            <span class="mode-card-name">Wort des Tages</span>
            <span class="mode-card-desc">Ein neues Gefühl täglich entdecken</span>
          </button>
          <button class="mode-card" data-mode="learn">
            <span class="mode-card-icon">🧠</span>
            <span class="mode-card-name">Karteikarten</span>
            <span class="mode-card-desc">Vokabeln mit Wiederholung</span>
          </button>
          <button class="mode-card" data-mode="journal">
            <span class="mode-card-icon">📓</span>
            <span class="mode-card-name">Journal</span>
            <span class="mode-card-desc">Tägliche Reflexion</span>
          </button>
          <button class="mode-card" data-mode="detective">
            <span class="mode-card-icon">🔍</span>
            <span class="mode-card-name">Gefühls-Detektiv</span>
            <span class="mode-card-desc">Finde das versteckte Gefühl</span>
          </button>
          <button class="mode-card" data-mode="needsmap">
            <span class="mode-card-icon">🗺️</span>
            <span class="mode-card-name">Bedürfnis-Karte</span>
            <span class="mode-card-desc">Gefühle & Bedürfnisse verbinden</span>
          </button>
        </div>
      </div>
      <div class="mode-group">
        <h3 class="mode-group-label">Verbinden</h3>
        <div class="mode-group-cards">
          <button class="mode-card" data-mode="tandem">
            <span class="mode-card-icon">🌍</span>
            <span class="mode-card-name">Tandem</span>
            <span class="mode-card-desc">Lerne mit echten Menschen weltweit</span>
          </button>
          <button class="mode-card" data-mode="deck">
            <span class="mode-card-icon">🎴</span>
            <span class="mode-card-name">Kartenset</span>
            <span class="mode-card-desc">Dein physisches Gefühle-Set</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Persona Picker -->
    <div id="persona-picker" class="persona-picker"></div>

  </section>

  <!-- Active Mode Container (hidden when landing is shown) -->
  <div class="active-mode-container" id="active-mode-container">

    <!-- Controls Row 2: Difficulty + Category + Multiplayer + New Game (classic/talk/story only) -->
    <div class="controls controls-row-2">
      <div class="control-group">
        <select id="difficulty-active"></select>
      </div>
      <div class="control-group">
        <select id="category-active">
          <option value="all">Alle Kategorien</option>
        </select>
      </div>
      <div class="control-group multiplayer-toggle">
        <select id="player-count-active">
          <option value="1">Solo</option>
          <option value="2">2 Spieler</option>
          <option value="3">3 Spieler</option>
          <option value="4">4 Spieler</option>
        </select>
      </div>
      <button class="btn-icon" id="btn-new-game" title="Neues Spiel">🔄</button>
    </div>

    <!-- Player Setup (Multiplayer) -->
    <div class="player-setup" id="player-setup"></div>

    <!-- Turn Indicator (Multiplayer) -->
    <div class="turn-indicator" id="turn-indicator"></div>

    <!-- Stats (Classic mode) -->
    <div class="stats">
      <div class="stat">
        <span>🃏</span>
        <span class="stat-value" id="stat-moves">0</span>
        <span>Züge</span>
      </div>
      <div class="stat">
        <span>💛</span>
        <span class="stat-value" id="stat-pairs">0/0</span>
        <span>Paare</span>
      </div>
      <div class="stat">
        <span>⏱</span>
        <span class="stat-value" id="stat-time">0:00</span>
      </div>
    </div>

    <!-- Classic Mode: Card Grid -->
    <main class="board" role="grid" aria-label="Memory Spielfeld"></main>

    <!-- Talk Mode -->
    <section class="talk-mode">
      <p class="talk-intro"></p>
      <div class="talk-card-display">
        <span class="card-emoji">💛</span>
        <span class="card-word">...</span>
        <span class="card-word-secondary">...</span>
      </div>
      <p class="talk-prompt"></p>
      <div class="talk-actions">
        <button class="draw-btn">Karte ziehen</button>
        <button class="btn-deep-question">Tiefere Frage 🤖</button>
      </div>
      <div class="talk-deep-result"></div>
    </section>

    <!-- Learn Mode -->
    <section class="learn-mode"></section>

    <!-- Story Mode -->
    <section class="story-mode">
      <p class="story-intro"></p>
      <div class="story-cards"></div>
      <button class="draw-btn">Neue Karten</button>
    </section>

    <!-- Check-in Mode -->
    <section class="checkin-mode"></section>

    <!-- Emotion Wheel Mode -->
    <section class="wheel-mode"></section>

    <!-- Journal Mode -->
    <section class="journal-mode"></section>

    <!-- Word of the Day Mode -->
    <section class="wotd-mode"></section>

    <!-- Ask Mode -->
    <section class="ask-mode"></section>

    <!-- Detective Mode -->
    <section class="detective-mode"></section>

    <!-- Needs Map Mode -->
    <section class="needsmap-mode"></section>
  </div>

  <!-- Prompt Overlay -->
  <div class="prompt-overlay" role="dialog" aria-modal="true">
    <div class="prompt-card">
      <div class="prompt-emoji"></div>
      <div class="prompt-word-primary"></div>
      <div class="prompt-word-secondary"></div>
      <div class="prompt-divider"></div>
      <div class="prompt-label"></div>
      <div class="prompt-question"></div>
      <div class="prompt-culture"></div>
      <!-- Resonance buttons (Win 1) -->
      <div class="prompt-resonance">
        <button class="resonance-btn" data-resonance="know">🤝 Kenn ich</button>
        <button class="resonance-btn" data-resonance="feel">💛 Fühle ich gerade</button>
        <button class="resonance-btn" data-resonance="surprise">✨ Überraschend</button>
      </div>
      <button class="prompt-share" title="Teilen">💛</button>
      <button class="prompt-close">✓</button>
    </div>
  </div>

  <!-- Congrats Overlay -->
  <div class="congrats-overlay" role="dialog" aria-modal="true">
    <div class="congrats-card">
      <div class="congrats-title"></div>
      <div class="congrats-text"></div>
      <div class="congrats-stars"></div>
      <div class="congrats-stats"></div>
      <div class="congrats-best"></div>
      <div class="congrats-emotion-summary"></div>
      <div class="congrats-persona-msg"></div>
      <div class="congrats-scoreboard"></div>
      <div class="congrats-buttons">
        <button class="btn btn-primary" id="btn-play-again">Nochmal</button>
        <button class="btn btn-secondary" id="btn-share">Teilen 💛</button>
      </div>
    </div>
  </div>

  <!-- Onboarding Overlay (first visit — content generated by initOnboarding()) -->
  <div class="onboarding-overlay" id="onboarding-overlay" style="display:none">
    <div class="onboarding-card"></div>
  </div>

  <!-- Pass Device Overlay (Multiplayer) -->
  <div class="pass-overlay" id="pass-overlay">
    <div class="pass-card">
      <div class="pass-name"></div>
      <div class="pass-hint"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>Gefühle-Memory 💛 67 Gefühle · 6 Kategorien · 11 Sprachen</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/lang-supplement.js"></script>
  <script src="js/api.js"></script>
  <script src="js/funfacts.js"></script>
  <script src="js/learn-data.js"></script>
  <script src="js/culture.js"></script>
  <script src="js/culture-insights.js"></script>
  <script src="js/card-art.js"></script>
  <script src="js/personas.js"></script>
  <script src="js/tandem.js"></script>
  <script src="js/detective.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/learn.js"></script>
  <script src="js/game.js"></script>
  <script>
    // Register Service Worker (only over HTTP, not file://)
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
    FunFacts.init();
    GefuehleAPI.init();
  </script>
</body>
</html>
